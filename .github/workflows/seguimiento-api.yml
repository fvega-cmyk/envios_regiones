name: Seguimiento API Envíame

# Se dispara manualmente (botón "Run workflow") o vía cron-job.org, que llama
# a la API de GitHub cada 30 minutos. No usamos el cron nativo de GitHub porque
# tiende a atrasarse.
on:
  workflow_dispatch:

jobs:
  seguimiento:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Descargar envíos y escribir en Seguimiento API
        env:
          ENVIAME_API_KEY: ${{ secrets.ENVIAME_API_KEY }}
          ID_SELLER: ${{ secrets.ID_SELLER }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          # Opcionales: ENVIAME_BASE_URL, HOJA_SALIDA, LIMIT, DIAS_ATRAS,
          # DELIVERY_STATUS_ID, VALUE_INPUT
        run: python seguimiento_api.py
