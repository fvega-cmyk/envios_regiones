name: Seguimiento API Envíame

# Corre automáticamente y también permite ejecutarlo a mano desde la pestaña "Actions".
# Nota: el cron de GitHub Actions a veces se atrasa; si necesitas puntualidad,
# puedes dispararlo desde cron-job.org igual que tus otros flujos.
on:
  workflow_dispatch:        # botón para ejecutarlo manualmente
  schedule:
    - cron: "0 12 * * *"    # todos los días a las 12:00 UTC (ajusta a tu horario)

jobs:
  seguimiento:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Descargar envíos y escribir en Seguimiento API
        env:
          ENVIAME_API_KEY: ${{ secrets.ENVIAME_API_KEY }}
          ID_SELLER: ${{ secrets.ID_SELLER }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          # Opcionales: ENVIAME_BASE_URL, HOJA_SALIDA, LIMIT, DIAS_ATRAS,
          # DELIVERY_STATUS_ID, VALUE_INPUT
        run: python seguimiento_api.py
